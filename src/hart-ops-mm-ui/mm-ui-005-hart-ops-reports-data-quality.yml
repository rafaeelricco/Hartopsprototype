id: "MM-UI-005"
title: "Hart Ops Platform Reports & Data Quality"
status: "draft"

dependencies:
  depends_on:
    - "TBD — to be filled manually"
  feeds_into:
    - "TBD — to be filled manually"

context: |
  Reports and Data Quality provide evidence of whether the SaaS model is working. The Data
  Quality Score is Hart's primary KPI — a platform-wide percentage measuring completeness of
  photos, questions, and inventory data. This screen answers the strategic question: "Is
  the data coming in good enough to prove value to clients?" As a Hart Ops administrator,
  I need to see platform-wide performance metrics and identify organizations with poor
  data quality so I can drive the quality feedback loop.

scope:
  in_scope:
    - "Reports dashboard with growth charts and top performer tables"
    - "Data Quality Score — platform-wide percentage and per-org trends"
    - "PDF and Excel export functionality"
    - "Quality feedback loop identification mechanism"
  out_of_scope:
    - "Organization-level internal reports (tenant-side responsibility)"
    - "Financial or revenue reporting (not specified in source)"
    - "Data quality remediation workflows (what happens after identifying poor quality)"
    - "Educator-level quality metrics detail (see Educator Mobile Experience)"

key_concepts:
  - term: "Data Quality Score"
    definition: "A platform-wide percentage calculated by aggregating completeness of three data dimensions — Photos, Questions, and Inventory — across all events and organizations. The primary KPI for Hart Ops."
    sources:
      - doc: "Hart Ops Super Admin Spec"
        details: "§5 Platform Reports & Data Quality — Data Quality Score"
  - term: "Trend Indicator"
    definition: "A visual element on the Data Quality overview showing whether an organization's quality score is improving, declining, or stable over time."
    sources:
      - doc: "Hart Ops Super Admin Spec"
        details: "§5 Platform Reports & Data Quality — Data Quality Score"
  - term: "Top Performers"
    definition: "Ranked tables in the Reports Dashboard showing the highest-performing Clients, Campaigns, and Educators across the platform."
    sources:
      - doc: "Hart Ops Super Admin Spec"
        details: "§5 Platform Reports & Data Quality — Reports Dashboard"

core_content:
  - section_title: "Reports Dashboard"
    points:
      - "Entry Point: 'Reports' item in the sidebar navigation."
      - "Elements: Multi-line growth charts showing platform-level trends over time."
      - "Elements: Top performer tables ranking Clients, Campaigns, and Educators."
      - "Functionality: Platform-wide stats available for export as PDF or Excel."
      - "Design principle: Reports provide the evidence layer — they must be clear enough to share with stakeholders without additional explanation."
    sources:
      - doc: "Hart Ops Super Admin Spec"
        details: "§5 Platform Reports & Data Quality — Reports Dashboard"

  - section_title: "Data Quality Score"
    points:
      - "Elements: Large platform-wide percentage score as the primary visual anchor."
      - "Elements: Trend indicators displayed per organization showing quality trajectory."
      - "Functionality: System aggregates completeness across three dimensions — Photos, Questions, and Inventory."
      - "Functionality: Score is calculated platform-wide and then broken down per organization and per campaign."
      - "Functionality: Score loads on landing — no user action required to see the primary metric."
    sources:
      - doc: "Hart Ops Super Admin Spec"
        details: "§5 Platform Reports & Data Quality — Data Quality Score"

  - section_title: "Quality Feedback Loop"
    points:
      - "Functionality: Data Quality Score is the primary mechanism for Hart to identify poor-quality submissions at scale."
      - "Functionality: Per-organization trend indicators enable Hart Ops to spot declining quality before it becomes systemic."
      - "Design principle: The score is not just a metric — it is an actionable trigger. Low scores should draw attention and prompt investigation."
      - "Assumption: The feedback loop's 'action' step (contacting the org, requiring resubmission) happens outside this screen."
    sources:
      - doc: "Hart Ops Super Admin Spec"
        details: "§5 Platform Reports & Data Quality — Data Quality Score — Rationale"

assumptions:
  - "PDF and Excel export covers the full Reports Dashboard content, not individual charts or tables selectively."
  - "Growth charts use time-series data with configurable date ranges — specific granularity (daily, weekly, monthly) to be defined during implementation."
  - "Top performer ranking criteria (what metric ranks clients, campaigns, educators) is not fully specified — likely event count or quality score."
  - "Data Quality Score calculation logic (weighting of Photos vs Questions vs Inventory) is not specified in source."
  - "Trend indicators use a simple directional model (up, down, stable) rather than percentage change."
  - "The Reports page does not support scheduled or automated report delivery — export is manual."

implications:
  - "Frontend: Reports dashboard requires a charting library capable of multi-line time-series charts."
  - "Frontend: Export functionality must handle PDF and Excel generation — either client-side or via a backend export service."
  - "Frontend: Data Quality Score needs a prominent visual treatment (large number, color-coded) to serve as the page's anchor element."
  - "Frontend: Trend indicators per organization require a compact visual component (arrow, sparkline, or similar)."
  - "Backend: Data Quality Score aggregation must be pre-computed or cached — calculating across all events on every page load will not scale."
  - "Backend: Export API must support both PDF and Excel formats with consistent data representation."
  - "Backend: Top performer queries need defined ranking criteria and efficient cross-org aggregation."
