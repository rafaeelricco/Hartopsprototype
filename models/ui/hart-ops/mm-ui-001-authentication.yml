# =============================================================================
# UI & FEATURE MENTAL MODEL — Operators Authentication
# =============================================================================

id: "mm-ui-001"
title: "Operators Authentication"
status: "draft"

dependencies:
  depends_on:
    - "TBD — to be filled manually"
  feeds_into:
    - "TBD — to be filled manually"

context: |
  Operators administrators are the platform's gatekeepers. Authentication is invitation-only —
  the first account is manually seeded by Ambar, creating a trust chain where only existing
  members can invite new ones. As a Operators administrator, I need a secure, frictionless
  authentication flow so I can access the platform quickly while maintaining invitation-only
  access control.

scope:
  in_scope:
    - "Sign-up activation via invitation email"
    - "Sign-in with email and password"
    - "Forgot password and password reset flow"
    - "Shared authentication layout and visual structure"
    - "Invitation email trigger mechanism"
  out_of_scope:
    - "Role-based permissions within Operators (Phase 1)"
    - "MFA/2FA"
    - "First account seeding process (backend/DevOps concern)"
    - "Session management and token refresh mechanics"

key_concepts:
  - term: "Activation Link"
    definition: "A one-time URL sent via invitation email that allows a new Operators user to set their password and activate their account. Expires after a defined period."
    sources:
      - doc: "Operators Super Admin Spec"
        details: "§1.1 Sign Up (Invitation Only)"
  - term: "Trust Chain"
    definition: "The invitation-only onboarding model where the first account is seeded by Ambar, and all subsequent accounts are created by existing members sending invitation emails."
    sources:
      - doc: "Operators Super Admin Spec"
        details: "§1 Authentication — Context"
  - term: "Active Account State"
    definition: "An account status that permits sign-in. Inactive or locked accounts are rejected at authentication with a specific error message rather than a generic one."
    sources:
      - doc: "Operators Super Admin Spec"
        details: "§1.2 Sign In — Edge Case"

core_content:
  - section_title: "Shared Auth Layout"
    points:
      - "Elements: Centered white card with rounded corners on a full-screen background."
      - "Elements: Logo centered above the card."
      - "Elements: Single-column vertical stack for all form fields."
      - "Elements: Labels positioned above inputs."
      - "Elements: Password field includes an inline 'Forgot password?' link aligned to the right."
      - "Elements: Full-width rounded button with high-contrast styling as primary action."
      - "Elements: Centered 'Terms of Service' and 'Privacy Policy' links at the bottom of the viewport."
    sources:
      - doc: "Operators Super Admin Spec"
        details: "§1 Authentication — Shared Layout"

  - section_title: "Sign Up (Invitation Only)"
    points:
      - "Entry Point: Existing Operators member sends an invitation email."
      - "Functionality: Email contains activation link → User clicks link → Activation screen loads → User sets password → Redirect to Sign In."
      - "Functionality: Password validation requires minimum 8 characters, 1 uppercase letter, 1 number, and 1 special character."
      - "Functionality: Expired activation link displays a 'Contact administrator' error message instead of allowing password set."
      - "Design principle: The activation flow ends at Sign In (not auto-login) to confirm the user can authenticate with their new credentials."
    sources:
      - doc: "Operators Super Admin Spec"
        details: "§1.1 Sign Up (Invitation Only)"

  - section_title: "Sign In"
    points:
      - "Entry Point: Direct URL or 'Sign In' link from Homepage."
      - "Functionality: User enters email and password → Auth Service validates → Redirect to Dashboard on success."
      - "Functionality: Email format validation is enforced on the client side."
      - "Functionality: Account must be in 'Active' state to proceed."
      - "Functionality: Inactive accounts display 'Account locked' error instead of generic 'Invalid credentials' — deliberate distinction to signal administrative action is needed."
    sources:
      - doc: "Operators Super Admin Spec"
        details: "§1.2 Sign In"

  - section_title: "Forgot Password"
    points:
      - "Entry Point: 'Forgot Password?' link on the Sign In page (inline with the password field)."
      - "Functionality: User enters email → System sends reset link → User clicks link → Password reset screen loads → User sets new password → Redirect to Sign In."
      - "Functionality: Email must exist in the system and be associated with an Active account."
      - "Functionality: Reset token has a defined expiration window (duration TBD)."
      - "Functionality: Used tokens cannot be reused — prevents replay attacks."
    sources:
      - doc: "Operators Super Admin Spec"
        details: "§1.3 Forgot Password"

assumptions:
  - "The first Operators account is seeded directly into the backend by Ambar during initial deployment."
  - "Password reset token expiration duration will be defined during implementation (not specified in source)."
  - "The 'Contact administrator' error on expired activation links does not reveal whether the email exists in the system."
  - "Session tokens are issued upon successful sign-in (mechanism not specified in source)."
  - "Rate limiting on sign-in attempts is expected but not explicitly defined in source material."

implications:
  - "Frontend: Auth screens share a single layout component with slot-based content swapping for Sign In, Sign Up, and Forgot Password forms."
  - "Frontend: Password field component needs dual functionality — toggling visibility and hosting the 'Forgot password?' link."
  - "Frontend: Client-side validation must match backend rules exactly (password complexity, email format) to avoid confusing mismatches."
  - "Backend: Activation and reset tokens must be single-use with server-side expiration tracking."
  - "Backend: Authentication must distinguish between 'invalid credentials' and 'inactive account' states to return appropriate error messages."
  - "Backend: The invitation email system is a dependency — must be operational before any new Operators user can onboard."
