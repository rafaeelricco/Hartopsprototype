# =============================================================================
# UI & FEATURE MENTAL MODEL — Educator Roster & Performance
# =============================================================================

id: "mm-ui-003"
title: "Educator Roster & Performance"
status: "draft"

dependencies:
  depends_on:
    - "mm-ui-001"
  feeds_into:
    - "mm-ui-002"

context: |
  Educator Managers need visibility into their assigned educators' contact
  information, availability, and performance metrics to make informed staffing
  decisions. The roster is the reference point when assigning educators to
  events. As an Educator Manager, I need a sortable roster of my educators
  with quick access to contact details and performance stats so I can assign
  the best-fit educator to each event.

scope:
  in_scope:
    - "Educator Roster list view with sortable columns"
    - "Educator Detail view with contact links and Quick Stats"
    - "Performance sorting and filtering"
    - "Manager-scoped roster (only assigned educators)"
  out_of_scope:
    - "Educator onboarding or account creation (Operators responsibility)"
    - "Educator mobile app experience (see Educator Mobile Experience)"
    - "Educator availability editing (educator self-service in mobile app)"
    - "Event assignment flow"
    - "Educator payroll or payment information"

key_concepts:
  - term: "Quick Stats"
    definition: "A set of at-a-glance performance metrics for an individual educator: average rating, sales per event, punctuality, and completed events count. Used by managers to assess educator fitness for event assignment."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §5.2"
  - term: "Scoped Roster"
    definition: "Each Educator Manager sees only their assigned educators, not the full org roster. This scoping ensures managers operate within their defined authority."
    sources:
      - doc: "MM8"
        details: "Assumptions — Managers see only their scoped slice"
  - term: "Educator Manager Permissions"
    definition: "Educator Managers have limited editing capability. They CAN: update an educator's contact details (phone, email), view educator Quick Stats and availability, assign educators to events, approve and finalize events. They CANNOT: modify educator profiles or status, manage certifications, change account settings, create/delete educator accounts, or access data outside their assigned scope. All other educator data is managed by Operators."
    sources:
      - doc: "MM8"
        details: "Implications — Managers are coordinators"
      - doc: "PDF-EM"
        details: "Educator Managers §5.2 — 'Edit Educator' button allows manager to update contact details only"
  - term: "Geography Proximity"
    definition: "Educators are contracted to work within a configurable radius of their home address (default ~100 miles, configurable at the org level). The roster surfaces this geographic context so managers can make proximity-aware assignment decisions."
    sources:
      - doc: "DEMO"
        details: "~01:10:03 — educators contracted to specific areas; won't drive outside ~100-mile radius from home"
      - doc: "DC1"
        details: "~00:52:05 — geography used to match educators to accounts at assignment time"
  - term: "Brand Certification"
    definition: "Educators can be pre-qualified on specific brands they repeatedly service. Certified educators get priority in assignment suggestions for those brands. Certification data is managed by Organization Admins and displayed as read-only on the Educator Manager roster."
    sources:
      - doc: "DC1"
        details: "~00:27:25 — educators pre-qualified on brands; certified educators get priority; certification speeds up event preparation"

core_content:
  - section_title: "Educator Roster List"
    points:
      - "Entry Point: 'Educators' item in the side navigation."
      - "Elements: Search bar for filtering educators by name or contact details."
      - "Elements: Filter bar — All, Active, Inactive status filters."
      - "Elements: Sort dropdown — sort by Events Completed, Name, Ratings."
      - "Elements: Educator card displays — Name, contact details, next event, number of events assigned."
      - "Elements: Inline contact action icons (tel and mailto) directly in each row for one-tap communication without navigating to the detail view."
      - "Functionality: Search bar filters the educator list based on the search term."
      - "Functionality: Filter bar updates the list to show All, Active, or Inactive educators."
      - "Functionality: Sort dropdown reorders the list by selected criterion."
      - "Functionality: Roster is scoped to the authenticated manager's assigned educators only."
      - "Functionality: Clicking an educator card navigates to the Educator Detail View."
      - "Design principle: The roster is the staffing reference — it should answer 'Who is available and performing well?' at a glance."
      - "Assumption: Educators who have been invited but not yet completed activation show with a 'Pending Invitation' status badge in the roster, distinct from Active and Inactive statuses."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §5.1 — educator card (name, contact, next event, events assigned), filter bar (all/active/inactive), search bar, sort dropdown (events completed, name, ratings)"
      - doc: "MM8"
        details: "Core Content — Educator Management"

  - section_title: "Educator Detail View"
    points:
      - "Entry Point: Clicking an educator card in the Roster List."
      - "Elements: Header — Educator photo, name, contact info (phone with tel link, email with mailto link), status indicator (Active/Inactive), 'Edit Educator' button."
      - "Elements: Quick Stats panel — Total Events Completed, Number of Events This Month, Average Rating, Average Sales Per Event, Punctuality Score."
      - "Elements: Geography / operating area — home base or region indicating where the educator is contracted to work."
      - "Elements: Brand certifications — read-only badges or tags showing which brands the educator is pre-qualified for."
      - "Elements: Upcoming Events — list of upcoming assigned events for this educator."
      - "Functionality: Contact links open the device's default email client or phone dialer."
      - "Functionality: 'Edit Educator' button allows manager to update contact details only (phone, email) — not profile, status, or certifications."
      - "Functionality: Quick Stats are read-only — derived from aggregated event data, not manually entered."
      - "Functionality: Brand certifications are managed by Organization Admins — read-only for managers."
      - "Functionality: Clicking any upcoming event card redirects to the Event Details page."
      - "Design principle: The detail view answers 'How is this educator performing?', 'How do I reach them?', and 'Are they right for this event?'"
      - "Elements: Past Events — chronological list of completed events for this educator, showing event name, date, location, and key outcome metrics (sales, consumer count)."
      - "Design principle: Past event history lets managers assess performance trends beyond aggregate Quick Stats."
      - "Elements: Availability calendar — read-only view of the educator's day-level and time-slot-level availability as maintained in their mobile app Availability tab."
      - "Design principle: Availability is front-and-center for staffing decisions — reducing phone/text coordination."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §5.2 — header with photo/name/contact/status/edit button; Quick Stats: total events, events this month, avg rating, avg sales; upcoming events list; edit limited to contact details"
      - doc: "DEMO"
        details: "~00:33:48"
      - doc: "DEMO"
        details: "~01:10:03 — educators contracted to specific geographic areas"
      - doc: "DC1"
        details: "~00:27:25 — brand certifications; pre-qualified educators get priority"
      - doc: "DC1"
        details: "~00:52:05 — geography and score surfaced for assignment decisions"
      - doc: "DC1"
        details: "~00:23:52 — availability and calendar functionality must be front and center"

  - section_title: "Performance Sorting & Filtering"
    points:
      - "Functionality: Sort the roster by performance metrics — average rating, sales per event, punctuality."
      - "Functionality: Filter the roster by status — Active or Inactive educators."
      - "Functionality: Sorting and filtering persist within the session until explicitly changed."
      - "Design principle: Performance-based sorting helps managers identify top performers for high-priority events."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §5.1, §5.2"

assumptions:
  - "Quick Stats (avg rating, sales per event, events completed, events this month) are computed server-side from historical event data."
  - "The roster does not support bulk actions (e.g., bulk status change) in Phase 1."
  - "Educator profile data (name, status, certifications) is managed by Organization Admins. Managers can only edit contact details (phone, email)."
  - "Performance metrics are updated after each event finalization, not in real-time."
  - "Managers cannot add or remove educators from their roster — assignment is managed at a higher level."
  - "Educators are part-time — typically 2 events per day, approximately 2 hours each. The roster is designed for a workforce that is not full-time and whose availability can vary day to day."
  - "Brand certification data is managed by Organization Admins — displayed as read-only badges or tags on the educator detail view."
  - "Educator photo is either uploaded by Operators or the educator themselves — read-only for managers."
  - "Educator score is displayed as a numeric value (e.g., 4.2/5.0 or 85/100) — exact format and formula TBD. Score is a computed aggregate of: completion rate, punctuality, cancellation history, and sales performance. It is NOT a manually entered field — it is derived from event data. Exact weighting formula to be defined during implementation."

implications:
  - "Frontend: Roster list rows should include inline contact action icons (tel/mailto) for one-tap communication — not just in the detail view."
  - "Frontend: Roster needs a search bar component with filtering by name or contact."
  - "Frontend: Filter bar with All/Active/Inactive status filters and sort dropdown (Events Completed, Name, Ratings)."
  - "Frontend: Educator Detail View should include direct-action contact links (mailto:, tel:) rather than plain text."
  - "Frontend: Educator Detail View must include educator photo, 'Edit Educator' button (limited to contact details), and upcoming events list."
  - "Frontend: 'Edit Educator' must restrict editable fields to phone and email only — all other fields remain read-only."
  - "Frontend: Quick Stats panel should use a consistent card or metric display pattern reusable across the app."
  - "Frontend: Brand certifications should render as read-only badges or tags — not editable fields."
  - "Backend: Quick Stats API must aggregate performance data from finalized events scoped to the requesting manager."
  - "Backend: Completed Events count must be aggregated from finalized events for the educator."
  - "Backend: Roster endpoint must enforce manager-level scoping — return only educators assigned to the authenticated manager."
  - "Backend: Consider caching Quick Stats as they only change on event finalization, not on every request."
  - "Architecture: The roster feeds into the educator assignment flow — the assignment UI should reference roster data without requiring a separate API call."
