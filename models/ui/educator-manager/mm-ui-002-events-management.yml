# =============================================================================
# UI & FEATURE MENTAL MODEL — Events Lifecycle & Assignment
# =============================================================================

id: "mm-ui-002"
title: "Events Lifecycle & Assignment"
status: "draft"

dependencies:
  depends_on:
    - "mm-ui-001"
  feeds_into: ["mm-ui-006"]

context: |
  Educator Managers do not create events — they receive assigned events from
  Trial Client Staff and manage them through their lifecycle: staffing educators
  before the event, monitoring live execution during the event, and finalizing
  the record after the event. Cancellations and reassignments are a normal part
  of operations (weather, illness, retailer cancellations) and require a defined
  manager-controlled workflow. As an Educator Manager, I need to view my events
  across list and calendar views, assign the right educator based on geography
  and availability, handle cancellations and reassignments, monitor real-time
  field data, and finalize completed events so the data pipeline can proceed
  to reporting.

scope:
  in_scope:
    - "Events List View with filters (Live, Upcoming, Completed)"
    - "Monthly Calendar View toggle"
    - "Pre-Event Detail View with educator assignment"
    - "Geography-based educator matching and assignment suggestions"
    - "Cancellation & Reassignment workflow with reason tracking"
    - "During-Event Live Dashboard monitoring"
    - "Post-Event Review and Finalization workflow"
    - "Speed-to-Finalize workflow for weekend event clusters"
  out_of_scope:
    - "Event creation (Trial Client Staff responsibility)"
    - "Campaign management (Trial Client Staff responsibility)"
    - "Educator mobile app data entry (see Educator Mobile Experience)"
    - "Report generation and analytics (downstream of finalization)"
    - "Out-of-platform scheduling negotiation (phone/text)"

key_concepts:
  - term: "Event Finalization"
    definition: "The act of a manager clicking 'Approve & Finalize' on a completed event. This is irreversible — it locks the event for all actors and terminates the educator's 24-hour editing window."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §5"
      - doc: "PDF-ED"
        details: "Post-event editing window"
  - term: "Educator Assignment"
    definition: "The in-platform act of selecting or reassigning an educator to an event. Managers can reference educator availability (maintained in-app) before confirming assignments."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §5"
      - doc: "DEMO"
        details: "~01:09:06"
  - term: "Speed-to-Finalize"
    definition: "A workflow pattern addressing the bottleneck of weekend event clusters — events pile up on weekends and managers need to finalize them quickly on Monday to unblock the reporting pipeline."
    sources:
      - doc: "MM8"
        details: "Assumptions — Speed-to-Finalize"
  - term: "Digital Availability"
    definition: "Educators maintain day-level and time-slot-level availability via the mobile app's Availability tab. Managers reference this before assigning educators to events, reducing phone/text back-and-forth for initial availability checks."
    sources:
      - doc: "DEMO"
        details: "~00:33:48"
  - term: "Account Master"
    definition: "A structured venue/location entity maintained by Hart Ops. Events are tied to account masters, not free-text addresses. Account masters carry geographic assignment, channel type (on-premise/off-premise), chain membership, and distributor identifiers. The account master's geography determines which Educator Manager receives the event."
    sources:
      - doc: "DC2"
        details: "~00:04:49 — account hierarchy with geography, channel, chain categorization"

core_content:
  - section_title: "Event Intake & Routing"
    points:
      - "Trigger: Trial Client Staff creates an event and assigns it to an account within the manager's geographic scope."
      - "Step 1: System routes the event to the manager based on account master geography — the account's geographic assignment determines which manager receives the event."
      - "Step 2: Manager receives a 'New Events Available' notification (Category 1 in mm-ui-004)."
      - "Step 3: Event appears in the Events List under 'Upcoming' with status 'Unassigned' (no educator assigned yet)."
      - "Functionality: Events auto-populate in the manager's list — no accept/acknowledge step required from the manager."
      - "Functionality: Event details (products, instructions, goals, compensation) are fully defined by Trial Client Staff before routing — the manager receives a complete, ready-to-staff event."
      - "Design principle: Events arrive ready for educator assignment. The manager's primary action on intake is staffing, not configuration."
    sources:
      - doc: "DC1"
        details: "~00:43:10 — once event is solidified on ops side, manager takes over for educator assignment"
      - doc: "DC1"
        details: "~00:52:05 — manager receives notification when event is ready; system suggests educator candidates"
      - doc: "DC2"
        details: "~00:07:33 — events templated from campaigns, assigned to accounts for execution"
      - doc: "DEMO"
        details: "~07:46 — events pushed simultaneously to educator managers and educators"

  - section_title: "Events List & Calendar View"
    points:
      - "Entry Point: 'Events' item in the side navigation."
      - "Elements: Search bar for filtering events by name, location, or educator."
      - "Elements: Top navigation filters — All Events, Live Events, Upcoming Events, Completed Events."
      - "Elements: Toggle control to switch between List View and Calendar View."
      - "Elements: Default view is List View — live events at the top, followed by upcoming, then completed."
      - "Elements: Event Card displays — Event Name, Location, date/time, assigned educator."
      - "Elements: Calendar View displays a monthly grid mapping events to dates with forward/backward navigation."
      - "Functionality: Clicking any top navigation filter updates the event list below."
      - "Functionality: Search bar filters events based on the search term."
      - "Functionality: Clicking any event card navigates to its detail view (phase-dependent)."
      - "Design principle: Managers need both chronological (list) and spatial/temporal (calendar) views to manage weekend clustering patterns."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §4 — Search bar, top navigation filters, event card content, list/calendar toggle"
      - doc: "MM8"
        details: "Core Content — Events List and Detail Flow"

  - section_title: "Pre-Event Detail View"
    points:
      - "Entry Point: Clicking an Upcoming event from the Events List or Calendar."
      - "Elements: Event Name, Location, date/time, and assigned educator (always visible)."
      - "Elements: Product Section — product images and details set by Trial Client Staff (read-only)."
      - "Elements: Event Instructions — setup details, parking info, WiFi credentials (read-only)."
      - "Elements: Event Kit/Materials — pickup details and list of materials required (read-only)."
      - "Elements: Event Goals — number of samples, sales targets, focus area (read-only)."
      - "Elements: Compensation — pay rate and event duration (read-only)."
      - "Elements: Contact Info — Educator Manager contact details AND Store/Bar manager contact details (name, phone with tel link, email with mailto link)."
      - "Elements: Educator Assignment section with CTA to assign or reassign an educator."
      - "Elements: Educator availability reference panel showing the selected educator's in-app availability."
      - "Functionality: Manager cannot edit event details (products, instructions, goals) — read-only from Trial Client Staff."
      - "Design principle: Pre-event focus is entirely on staffing — ensuring the right educator is confirmed for the event."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §5 — Pre-Event elements: products, instructions, kit/materials, goals, compensation, contact info"
      - doc: "DEMO"
        details: "~01:09:06"

  - section_title: "Educator Assignment Flow"
    points:
      - "Entry Point: 'Assign Educator' or 'Reassign' CTA on the Pre-Event Detail View. If no educator is assigned, clicking the educator area brings up the assignment list."
      - "Step 1: Search/filter roster to identify Active educators without scheduling conflicts."
      - "Step 2: System surfaces assignment suggestions ranked by multiple signals:"
      - "  - Geography proximity: educator home address vs. event account address (educators contracted within ~100-mile radius)."
      - "  - Educator score: aggregate performance rating from historical event data."
      - "  - Digital availability: day-level and time-slot-level availability maintained by the educator in the mobile app."
      - "  - Brand certification: pre-qualified educators get priority for brands they are certified on (future enhancement)."
      - "  - Scheduling conflicts: exclude educators already booked for overlapping events."
      - "Step 3: View educator's digital availability calendar for the event date/time — shows day-level and time-slot-level availability as maintained in the educator's mobile app Availability tab."
      - "Step 4: Confirm assignment → System sends notification to the assigned educator as a suggested opportunity."
      - "Functionality: Manager can assign 1 or more educators to a single event when staffing requirements demand it."
      - "Functionality: If educator is already assigned — display educator name, photo, contact info, and 'Reassign' button."
      - "Functionality: Educators are not employees — assignment is a suggestion they can accept or reject. Final confirmation may still require out-of-platform contact in Phase 1."
      - "Functionality: Reassignment replaces the current educator and notifies both the outgoing and incoming educator."
      - "Functionality: Availability reference reduces but does not eliminate phone/text coordination — full scheduling negotiation remains external in Phase 1."
      - "Step 5: After manager confirms assignment, system sends the event as a suggested opportunity to the educator via mobile app notification."
      - "Functionality: Event displays educator assignment status — Pending Acceptance (awaiting educator response), Accepted (educator confirmed), Declined (educator rejected)."
      - "Functionality: If educator declines, manager receives a notification and the event returns to 'Unassigned' status, re-appearing on the dashboard 'Events Requiring Attention' card."
      - "Functionality: Educator acceptance/rejection happens in the mobile app — the manager sees the resulting status change in near real-time."
      - "Functionality: When multiple educators are assigned to a single event, each appears as a separate card in the assignment section with individual status, check-in tracking, and contact information."
      - "Assumption: Each educator on a multi-educator event has independent check-in/check-out and task completion tracking."
      - "Assumption: Finalization of a multi-educator event requires all assigned educators to have completed their tasks — exact behavior TBD."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §5 — assignment flow; manager can add 1+ educators to event; if assigned shows name/photo/contact/reassign"
      - doc: "DEMO"
        details: "~00:33:48 — educators maintain day-level and time-slot-level availability via mobile app"
      - doc: "DC1"
        details: "~00:52:05 — geography proximity, educator scoring as assignment factors; educators accept/reject as non-employees"
      - doc: "DC1"
        details: "~00:52:05 — educators are not employees; assignment is a suggestion they can accept or reject in the app"
      - doc: "DC1"
        details: "~00:27:25 — brand certifications; pre-qualified educators get priority in assignment suggestions"
      - doc: "DEMO"
        details: "~01:10:03 — educators contracted to work within ~100-mile radius of home address; manager calls to confirm availability"

  - section_title: "Cancellation & Reassignment Workflow"
    points:
      - "Trigger: Educator cannot attend a confirmed event (illness, weather, car accident, retailer cancellation)."
      - "Step 1: Educator communicates inability to the manager (out-of-platform in Phase 1 — phone/text)."
      - "Step 2: Manager opens the event and initiates cancellation — educator does not have the power to self-cancel."
      - "Step 3: Manager selects a cancellation reason from a predefined category list (weather, illness, car accident, retailer cancellation, other)."
      - "Step 4: Cancellation is confirmed and tagged to the educator for scoring purposes."
      - "Step 5: Manager immediately searches for a replacement educator using the same assignment flow — finding a replacement is the most critical outcome."
      - "Functionality: Outgoing educator and incoming replacement both receive notifications on reassignment."
      - "Step 6: After educator cancellation is confirmed, the event returns to 'Unassigned' status and re-appears on the dashboard 'Events Requiring Attention' card."
      - "Functionality: If the event itself is cancelled (retailer cancellation, not just educator swap), the event enters a terminal 'Cancelled' status and is removed from the active events list."
      - "Design principle: The cancellation workflow exists to protect event execution — the goal is a replacement, not just a record of the cancellation."
    sources:
      - doc: "DC1"
        details: "~00:53:09 — cancellation reasons: weather, illness, car accident, retailer cancellation"
      - doc: "DC1"
        details: "~00:54:10 — educator cannot self-cancel; manager makes the call; cancellation tagged for scoring; finding a replacement is the most important next step"

  - section_title: "During-Event Live Dashboard"
    points:
      - "Entry Point: Clicking a Live event from the Events List or Calendar."
      - "Elements: Geolocated check-in status showing whether the educator arrived at the venue."
      - "Elements: Live metrics streaming in real-time from the educator's mobile app."
      - "Elements: Photo uploads submitted by the educator during the event."
      - "Elements: Check-in timestamp — shows the exact time the educator completed geolocated check-in at the venue."
      - "Elements: Real-time inventory & sales data — streaming from the educator's mobile app as they log transactions."
      - "Elements: Real-time count of consumer questionnaires completed — updated as the educator submits each profile."
      - "Elements: Real-time notes submitted by the educator during the event."
      - "Functionality: Manager monitors in read-only mode — no editing of live event data."
      - "Functionality: Check-in success displays a green status indicator with timestamp and location confirmation."
      - "Functionality: Check-in failure (educator not within geofence radius of venue) triggers a 'Failed Check-In' notification (Category 4 in mm-ui-004) and displays a red status indicator."
      - "Functionality: Check-out requires geolocation verification at the venue and all mandatory tasks completed."
      - "Design principle: Live monitoring answers 'Is the event happening as planned?' without requiring manager intervention."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §4"
      - doc: "PDF-EM"
        details: "§5 — During-Event Elements: check-in timestamp, real-time inventory/sales, questionnaires, notes, photos"
      - doc: "IPF"
        details: "Geolocation verification — within 500ft of venue"
      - doc: "MM8"
        details: "Core Content — Events List and Detail Flow"

  - section_title: "Post-Event Review & Finalization"
    points:
      - "Entry Point: Clicking a Completed event from the Events List (filtered by 'Completed')."
      - "Elements: Final stats summary (sales data, consumer interactions, samples distributed)."
      - "Elements: Photo gallery of event photos submitted by the educator."
      - "Elements: 'Approve & Finalize' CTA button — prominent, high-contrast styling."
      - "Functionality: Finalization is irreversible — no undo mechanism in Phase 1."
      - "Functionality: Finalization locks the event record for all actors (manager, educator, Trial Client Staff)."
      - "Functionality: Finalization terminates the educator's 24-hour post-event editing window immediately."
      - "Functionality: Speed-to-Finalize — events cluster on weekends; managers need efficient batch review on Monday."
      - "Elements: Pre & post event inventory comparison — shows starting vs ending inventory levels side by side."
      - "Elements: Final count of consumer questionnaires completed during the event."
      - "Elements: Notes submitted by the educator — viewable in full text."
      - "Elements: Photos uploaded, categorized by type — receipts, social media posts, venue photos."
      - "Functionality: Download photos — manager can download individual or batch event photos."
      - "Functionality: Export event data — manager can export event data (PDF or CSV) for offline review or sharing."
      - "Design principle: Finalization is the bottleneck of the data pipeline — reporting depends on managers closing events."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §5"
      - doc: "PDF-EM"
        details: "§5 — Post-Event Elements: inventory, questionnaires, notes, photos; Functionality: download photos, export data"
      - doc: "PDF-ED"
        details: "Post-event editing window"
      - doc: "MM8"
        details: "Assumptions — Speed-to-Finalize; Implications — Finalization bottleneck"

  - section_title: "Speed-to-Finalize Batch Review"
    points:
      - "Entry Point: Filtered view of Completed events pending finalization — accessible from the 'Events Requiring Attention' dashboard card or the Completed events filter."
      - "Elements: Queue or list of all completed events awaiting 'Approve & Finalize' action, ordered by completion date."
      - "Elements: Inline summary per event — event name, date, educator, key stats (sales, consumers) — enabling quick assessment without opening each detail view."
      - "Functionality: Manager can review and finalize events sequentially from the queue without returning to the main list between each one."
      - "Assumption: Batch finalization (one-click approval for multiple events at once) is a potential future enhancement — Phase 1 requires individual event review."
      - "Design principle: Weekend event clustering creates a Monday bottleneck. The queue pattern reduces the time-to-finalize by eliminating navigation friction."
    sources:
      - doc: "MM8"
        details: "Assumptions — Speed-to-Finalize pattern for weekend event clusters"
      - doc: "DC1"
        details: "~00:54:10 — events pile up over weekends; managers need efficient review on Monday"

assumptions:
  - "List View supports sorting by date, status, and assigned educator."
  - "Calendar View supports navigation between months (previous/next)."
  - "The transition from Upcoming to Live happens automatically when the event's scheduled date/time arrives."
  - "Live Data Feed phase shows partial/incoming data in near real-time."
  - "Finalization is irreversible — no undo mechanism in Phase 1."
  - "Managers see only events assigned to their scoped set of educators, not all tenant events."
  - "The 24-hour educator editing window countdown starts at event completion, not at finalization."
  - "Cancellation reasons are categorized (weather, illness, car accident, retailer-initiated, other) for scoring accuracy."
  - "Educator acceptance/rejection of assignments is tracked in-platform with status indicators (Pending/Accepted/Declined), though initial negotiation may still involve phone/text coordination in Phase 1."
  - "Events are routed to managers based on account geography — the account master's geographic assignment determines which manager receives the event notification."
  - "Event details are fully defined (solidified) by Trial Client Staff before the event is sent to the manager for educator assignment."
  - "Educator scoring is an aggregate metric derived from: event completion rate, punctuality, cancellation history, sales performance, and ratings. Exact formula TBD."
  - "Events route to managers based on account master geography — the account's geographic assignment determines which manager receives the event notification."
  - "Educator acceptance/rejection of assignments is tracked in-platform even if initial negotiation happens via phone/text in Phase 1."
  - "Educator employment classification: Source material is contradictory — DEMO ~01:10 describes educators as 'technically employees of Hart,' while DC1 ~00:52 describes them as contractors who can accept or reject assignments. The platform models the relationship as contractor-like (suggested opportunities, accept/reject) regardless of legal classification. Exact legal status requires clarification from Hart."

implications:
  - "Frontend: Implement dual-view toggle (List/Calendar) with shared event data source to avoid redundant API calls."
  - "Frontend: Calendar component must handle dense weekend clustering without visual clutter."
  - "Frontend: Event detail view needs clear phase indicators showing current lifecycle state (Upcoming, Live, Completed)."
  - "Frontend: 'Approve & Finalize' CTA requires a confirmation dialog given its irreversibility."
  - "Frontend: Educator assignment flow needs an inline availability reference panel, not a separate screen."
  - "Frontend: Assignment suggestion list should surface geography proximity, educator score, availability status, and brand certifications as ranked signals."
  - "Frontend: Assignment flow must support assigning 1+ educators to a single event when needed."
  - "Frontend: Speed-to-Finalize queue should support sequential review without returning to the main event list."
  - "Frontend: Cancellation flow requires a reason selection modal before confirming — the reason is required, not optional."
  - "Backend: Event lifecycle state machine must enforce phase transitions and prevent edits on finalized events."
  - "Backend: Live Data Feed requires real-time or near-real-time data ingestion pipeline from the educator mobile app."
  - "Backend: Finalization endpoint must atomically lock the event and terminate the educator editing window."
  - "Backend: Educator assignment must trigger push notifications to the assigned educator."
  - "Backend: Assignment suggestion API must rank educators by geography proximity, score, availability, and brand certification."
  - "Backend: Event routing must use account master geography to determine which manager receives the event."
  - "Backend: Cancellation events must be persisted with reason codes for educator scoring aggregation."
  - "Architecture: Consider WebSocket or SSE for the Live Dashboard phase to push updates without polling."
  - "Frontend: During-Event Live Dashboard must display 6 distinct data streams — check-in status, inventory/sales, questionnaire count, notes, photos, and geolocated check-in timestamp."
  - "Frontend: Post-Event Review must include photo download and data export functionality."
  - "Frontend: Event cards must show assignment status (Unassigned, Pending, Accepted) in addition to lifecycle phase."
  - "Backend: Event intake routing must use account master geography to determine the target Educator Manager."
  - "Backend: Educator assignment status changes (accept/reject) must propagate from the mobile app to the manager's web view in near real-time."
  - "Architecture: Finalization is the data pipeline bottleneck — monitoring finalization latency is operationally critical."
