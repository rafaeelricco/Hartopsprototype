# =============================================================================
# UI & FEATURE MENTAL MODEL — Settings & Notifications
# =============================================================================

id: "mm-ui-004"
title: "Settings & Notifications"
status: "draft"

dependencies:
  depends_on:
    - "mm-ui-001"
  feeds_into: ["mm-ui-002"]

context: |
  Educator Managers have the most granular notification set on the platform —
  they need timely alerts for staffing gaps, event starts, check-in failures,
  and review readiness. Notification reliability is the primary driver of
  platform engagement for this role. As an Educator Manager, I need fine-grained
  control over my notification preferences and access to help resources so I
  can stay responsive to field operations without being overwhelmed by noise.

scope:
  in_scope:
    - "Notification preferences with per-category toggles"
    - "5 notification categories with trigger conditions"
    - "Help & Support — FAQ list and contact support fallback"
  out_of_scope:
    - "User profile and account management"
    - "Organization-level settings (Trial Client Staff responsibility)"
    - "Notification delivery infrastructure (backend concern)"
    - "FAQ content creation (Trial Client Staff responsibility — consumed here)"
    - "Push notification permission prompts (OS-level concern)"

key_concepts:
  - term: "Notification Categories"
    definition: "Five distinct notification types for Educator Managers, each with specific trigger conditions: new events assigned, unstaffed events (7-day warning), events starting in 1 hour, failed educator check-in, and events ready for review."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §6.1"
  - term: "Help & Support"
    definition: "A section that consumes FAQ content managed by Trial Client Staff. Provides self-service answers with a contact support fallback for issues not covered by FAQs."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §6.2"
  - term: "Notification Reliability"
    definition: "For Educator Managers, notification reliability is the primary driver of platform engagement. Missed notifications directly impact event staffing and finalization timelines."
    sources:
      - doc: "MM8"
        details: "Implications — Notification reliability"

core_content:
  - section_title: "Notification Preferences"
    points:
      - "Entry Point: 'Settings' item in the side navigation."
      - "Elements: 5 notification categories displayed as a list, each with an individual toggle (on/off)."
      - "Elements: 'Enable Email Notifications' toggle — controls whether notification categories are also delivered via email."
      - "Functionality: Per-category toggles allow managers to enable or disable specific notification types."
      - "Functionality: All categories default to enabled on account activation."
      - "Functionality: Notification delivery supports both in-app and email channels. Email notifications include the specific trigger details for each category."
      - "Design principle: Granular control prevents notification fatigue while ensuring critical alerts are not missed."
      - "Functionality: 'Enable Email Notifications' is a global toggle. When enabled, all individually-enabled notification categories are also delivered via email. When disabled, only in-app delivery is used."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §6.1 — Enable Email Notifications with supported notification types listed"

  - section_title: "Notification Types Detail"
    points:
      - "Elements: Category 1 — New Events Available. Trigger: Trial Client Staff creates an event within the manager's geographic scope, routing it to the manager for educator assignment."
      - "Elements: Category 2 — Unstaffed Events Warning. Trigger: An event is 7 days away with no educator assigned. This is the primary signal for managers to act on availability gaps before they become critical."
      - "Elements: Category 3 — Event Starting Soon. Trigger: An assigned event starts in 1 hour."
      - "Elements: Category 4 — Failed Educator Check-In. Trigger: Educator has not completed geolocated check-in by event start time."
      - "Elements: Category 5 — Event Ready for Review. Trigger: Event is completed and awaiting manager finalization."
      - "Design principle: Each notification type maps to a specific manager action — assign educator, follow up, monitor, or finalize."
      - "Functionality: Category 1 (New Events Available) — tapping navigates to the event's Pre-Event Detail View for educator assignment."
      - "Functionality: Category 2 (Unstaffed Events Warning) — tapping navigates to the event's Pre-Event Detail View with the assignment flow highlighted."
      - "Functionality: Category 3 (Event Starting Soon) — tapping navigates to the event's Live Detail View."
      - "Functionality: Category 4 (Failed Check-In) — tapping navigates to the event's During-Event Live Dashboard showing the check-in failure status."
      - "Functionality: Category 5 (Event Ready for Review) — tapping navigates to the event's Post-Event Review with the 'Approve & Finalize' CTA visible."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §6.1"
      - doc: "MM8"
        details: "Core Content — Settings and Notifications"
      - doc: "DC1"
        details: "~00:25:09 — availability gaps surfaced to managers; Category 2 (Unstaffed Events Warning) is the notification-layer expression of this"

  - section_title: "Help & Support"
    points:
      - "Entry Point: 'Help & Support' section within Settings, or a dedicated sub-navigation item."
      - "Elements: FAQ list displaying questions and expandable answers (collapsible accordion)."
      - "Elements: Search or filter input to find relevant FAQ entries."
      - "Elements: Contact Information — support email (with mailto: link) and support phone number."
      - "Functionality: FAQ content is managed by Trial Client Staff — displayed here as read-only."
      - "Functionality: FAQs are the same content set pushed to field educators, providing consistency across roles."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §6.2 — FAQs and Contact Information (support email, phone)"


  - section_title: "Logout"
    points:
      - "Entry Point: Logout action within the Settings section."
      - "Functionality: Clicking Logout ends the manager's session and redirects to the Sign In screen."
      - "Functionality: Session tokens are invalidated on logout."
    sources:
      - doc: "PDF-EM"
        details: "Educator Managers §2 — Settings includes Logout"

assumptions:
  - "All 5 notification categories default to enabled upon account activation."
  - "Notification delivery supports in-app and email. Push notifications are assumed but not explicitly specified in the source material for this role."
  - "The 7-day unstaffed warning triggers once per event, not daily."
  - "Failed check-in notification triggers at event start time, not before."
  - "FAQ content syncs from the Trial Client Staff-managed help resources — no manual curation by managers."
  - "'Contact Support' links to an email or external support system — specifics TBD."
  - "Notification preferences are stored per-manager and persist across sessions."
  - "The effectiveness of the Unstaffed Events Warning (Category 2) depends on educators maintaining their availability in-app. The manager notification system's value degrades if educator availability data is stale. Pinging educators to update availability is a mobile-app concern, but managers benefit directly from fresh availability data."
  - "In-app notifications are displayed via a notification bell icon in the header/navigation with an unread count badge."
  - "Notification history is viewable as a chronological list — implementation detail TBD."

implications:
  - "Frontend: Navigation header must include a notification bell icon with unread count badge — tapping opens notification history."
  - "Frontend: Notification preferences screen needs toggle components with immediate save (no separate 'Save' button) or explicit save action — pattern TBD."
  - "Frontend: FAQ section needs an expandable/collapsible list component with search filtering."
  - "Frontend: Each notification type should include a brief description of its trigger condition alongside the toggle."
  - "Backend: Notification preferences API must support per-category, per-manager storage and retrieval."
  - "Backend: Notification trigger engine must evaluate 5 distinct conditions and respect manager preferences before dispatching."
  - "Backend: FAQ content endpoint must serve the same content managed by Trial Client Staff in the Brand Assets settings."
  - "Architecture: Notification reliability is operationally critical — consider delivery confirmation and retry mechanisms."
  - "Architecture: The notification system is a shared service across roles — Educator Manager preferences are one consumer of a broader notification infrastructure."
