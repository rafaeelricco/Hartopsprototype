# =============================================================================
# UI & FEATURE MENTAL MODEL — Campaign Management
# =============================================================================

id: "mm-ui-002"
title: "Campaign Management"
status: "draft"

dependencies:
  depends_on:
    - "TBD — to be filled manually"
  feeds_into:
    - "mm-ui-003"

context: |
  As an Operating Staff member, I need to create and manage campaigns as
  top-level containers that group events under shared objectives, so I can
  organize field operations and track performance at the campaign level.

scope:
  in_scope:
    - "Campaign Library card-based grid view"
    - "Create Campaign modal/drawer flow"
    - "Campaign form fields and validations"
    - "Duplicate name edge case handling"
  out_of_scope:
    - "Event creation within a campaign"
    - "Campaign performance reporting"
    - "Campaign deletion or archival workflows"
    - "Campaign editing after creation"

key_concepts:
  - term: "Campaign"
    definition: "A top-level container grouping multiple events under a shared objective, name, and description."
    sources:
      - doc: "operating_staff_spec.md"
        details: "Section II.2 — Context"
  - term: "Campaign Library"
    definition: "The main listing view showing all campaigns as a card-based grid with name and event counts."
    sources:
      - doc: "operating_staff_spec.md"
        details: "Section II.2 — Campaign Library"

core_content:
  - section_title: "Campaign Library View"
    points:
      - "Elements: Card-based grid layout displaying all campaigns."
      - "Elements: Each card shows campaign name and event count."
      - "Design principle: Grid view provides quick visual scanning of campaign portfolio."
    sources:
      - doc: "operating_staff_spec.md"
        details: "Section II.2 — Campaign Library"

  - section_title: "Create Campaign Flow"
    points:
      - "Entry Point: 'Create Campaign' CTA button in the Library header."
      - "Step 1: Modal or Drawer opens with a form."
      - "Elements: Form fields — Name (required), Description."
      - "Step 2: User fills fields and clicks Submit."
      - "Validation: Name field is required — cannot be empty."
      - "Validation: Name must be unique within the Organization."
    sources:
      - doc: "operating_staff_spec.md"
        details: "Section II.2 — Create Campaign"

  - section_title: "Edge Cases & Error Handling"
    points:
      - "Edge Case: If user enters a duplicate campaign name, show inline validation error 'Name already in use'."
      - "Functionality: Validation should be real-time or on submit — source does not specify timing."
    sources:
      - doc: "operating_staff_spec.md"
        details: "Section II.2 — Edge Case"

assumptions:
  - "Campaign Library supports pagination or infinite scroll for large numbers of campaigns."
  - "Cards in the grid are clickable and navigate to campaign detail view."
  - "Create Campaign modal/drawer can be dismissed without losing other page state."
  - "Duplicate name validation is server-side (checked against Organization-level data)."
  - "No campaign editing flow is described — assumed to exist but out of scope for this model."

implications:
  - "Frontend: Implement card grid component with responsive layout for varying screen sizes."
  - "Frontend: Create Campaign form needs real-time or on-blur uniqueness validation for the name field."
  - "Backend: API must support uniqueness check for campaign names scoped to the Organization."
  - "Backend: Campaign creation endpoint returns field-level validation errors for immediate UI feedback."
